services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: skillhub-postgres
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub -d nexus"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: skillhub-dragonfly
    command:
      - --cache_mode=true
      - --maxmemory=${DRAGONFLY_MAXMEMORY:-512mb}
      - --proactor_threads=${DRAGONFLY_THREADS:-2}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nexus:
    build:
      context: .
      dockerfile: docker/nexus.Dockerfile
      args:
        NEXUS_IMAGE: ${NEXUS_IMAGE:-ghcr.io/nexi-lab/nexus:0.9.2}
    image: skill-hub-nexus:latest
    platform: ${NEXUS_PLATFORM:-linux/amd64}
    container_name: skillhub-nexus
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
    ports:
      - "2026:2026"
    environment:
      NEXUS_HOST: 0.0.0.0
      NEXUS_PORT: 2026
      NEXUS_PROFILE: full
      NEXUS_CONFIG_FILE: /app/configs/config.skillhub.yaml
      NEXUS_API_KEY: ${NEXUS_API_KEY:-sk-dev-skillhub-admin-1234567890abcdef}
      NEXUS_DATABASE_URL: postgresql://skillhub:skillhub@postgres:5432/nexus
      NEXUS_CACHE_BACKEND: ${NEXUS_CACHE_BACKEND:-dragonfly}
      NEXUS_DRAGONFLY_URL: ${NEXUS_DRAGONFLY_URL:-redis://dragonfly:6379}
      NEXUS_SEARCH_DAEMON: "true"
      NEXUS_SKIP_PERMISSIONS: "true"
      NEXUS_ENFORCE_PERMISSIONS: "false"
    volumes:
      - nexus-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2026/healthz/ready"]
      start_period: ${NEXUS_HEALTH_START_PERIOD:-120s}
      interval: 10s
      timeout: 10s
      retries: 40

  skillhub:
    build:
      context: .
      dockerfile: Dockerfile
    image: skill-hub:latest
    container_name: skillhub-api
    depends_on:
      nexus:
        condition: service_healthy
    ports:
      - "8040:8040"
    environment:
      NEXUS_BASE_URL: http://nexus:2026
      NEXUS_API_KEY: ${NEXUS_API_KEY:-sk-dev-skillhub-admin-1234567890abcdef}
      SKILLHUB_NEXUS_INSTALL_ROOT: /skills
      SKILLHUB_NEXUS_CATALOG_ROOT: /skill-hub
    volumes:
      - ./examples:/workspace/examples:ro
      - ./scripts:/workspace/scripts:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8040/health"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  nexus-data:
