profile: full

db_path: ${NEXUS_DATABASE_URL:-postgresql://skillhub:skillhub@postgres:5432/nexus}

server:
  host: 0.0.0.0
  port: 2026
  workers: 4
  log_level: info

database:
  url: ${NEXUS_DATABASE_URL:-postgresql://skillhub:skillhub@postgres:5432/nexus}
  pool_size: 10
  max_overflow: 20
  echo: false

backends:
  - type: local
    mount_point: /
    config:
      root_path: /app/data
    priority: 0
    readonly: false

auth:
  jwt_secret: ${JWT_SECRET:-skillhub-dev-secret-change-me}
  jwt_algorithm: HS256
  token_expiry_hours: 24
  api_key_expiry_days: 365

enforce_permissions: false
enforce_zone_isolation: false

features:
  search: true
  semantic_search: true
  llm: false
  scheduler: false
  sandbox: false
